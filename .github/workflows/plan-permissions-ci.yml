name: Plan permissions deployment gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  plan-permissions:
    name: Run plan permission tests before deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_API_BASE_URL: ${{ vars.E2E_API_BASE_URL || 'http://127.0.0.1:3101/api' }}
      E2E_WEB_BASE_URL: ${{ vars.E2E_WEB_BASE_URL || 'http://127.0.0.1:3200/yansir/' }}
      E2E_DEMO_PASSWORD: ${{ secrets.E2E_DEMO_PASSWORD || 'radar123' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run membership permission CI gate
        run: npm run test:plans:ci

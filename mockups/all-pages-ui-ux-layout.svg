<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1260" viewBox="0 0 1800 1260">
  <rect width="1800" height="1260" fill="#eef2f7"/>
  <text x="60" y="62" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="800" fill="#101722">SignalOS 页面 UI / UX / 布局效果图</text>
  <text x="60" y="96" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#66717e">依据 apps/web/src/components/AppShell.tsx 的真实页面结构绘制：5 个底部导航页 + 币种详情页。用于布局确认，不代表新增功能。</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#12203a" flood-opacity="0.12"/>
    </filter>
    <style>
      .phone{fill:#f4f7fb;stroke:#d8e0ea;stroke-width:1.5;filter:url(#shadow)}
      .bar{fill:#fff;stroke:#e4eaf3;stroke-width:1}
      .card{fill:#fff;stroke:#e4eaf3;stroke-width:1}
      .soft{fill:#f6f8fb;stroke:#e4eaf3;stroke-width:1}
      .blue{fill:#326cff}
      .green{fill:#22ae73}
      .red{fill:#f04f5f}
      .muted{fill:#6b7480}
      .title{font:800 23px Microsoft YaHei,Arial,sans-serif;fill:#101722}
      .h2{font:800 17px Microsoft YaHei,Arial,sans-serif;fill:#101722}
      .txt{font:400 13px Microsoft YaHei,Arial,sans-serif;fill:#536072}
      .small{font:400 11px Microsoft YaHei,Arial,sans-serif;fill:#7a8492}
      .nav{font:400 11px Microsoft YaHei,Arial,sans-serif;fill:#89929e}
      .pill{fill:#e8f0ff;stroke:#d2e0ff;stroke-width:1}
    </style>

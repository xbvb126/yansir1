    <rect class="card" x="18" y="186" width="214" height="74" rx="12"/><text x="32" y="212" class="h2">飞书机器人</text><text x="32" y="234" class="small">Webhook 输入框 + 保存 + 测试</text><rect class="soft" x="32" y="242" width="150" height="10" rx="4"/>
    <rect class="card" x="18" y="272" width="214" height="84" rx="12"/><text x="32" y="298" class="h2">告警规则</text><text x="32" y="320" class="small">币种、周期、最低分、方向、冷却</text><rect class="soft" x="32" y="334" width="46" height="16" rx="4"/><rect class="soft" x="86" y="334" width="46" height="16" rx="4"/><rect class="soft" x="140" y="334" width="46" height="16" rx="4"/>
    <rect x="18" y="372" width="102" height="38" rx="8" fill="#326cff"/><text x="43" y="396" class="h2" fill="#fff">预览</text><rect x="130" y="372" width="102" height="38" rx="8" fill="#326cff"/><text x="154" y="396" class="h2" fill="#fff">推送</text>

      <rect class="card" y="54" width="214" height="44" rx="8"/><text x="0" y="72" class="h2">ETH</text><text x="66" y="72" class="h2">$3606.80</text><text x="150" y="72" class="h2" fill="#22ae73">+3.86%</text><circle cx="198" cy="76" r="17" fill="#326cff"/><text x="191" y="81" class="small" fill="#fff">78</text>
      <rect class="card" y="108" width="214" height="44" rx="8"/><text x="0" y="126" class="h2">UB</text><text x="66" y="126" class="h2">$0.1543</text><text x="150" y="126" class="h2" fill="#22ae73">+28%</text><circle cx="198" cy="130" r="17" fill="#326cff"/><text x="191" y="135" class="small" fill="#fff">91</text>

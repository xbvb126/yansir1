    <rect x="14" y="346" width="104" height="40" rx="8" fill="#fff" stroke="#326cff"/><text x="38" y="371" class="h2" fill="#326cff">预览</text>
    <rect x="132" y="346" width="104" height="40" rx="8" fill="#326cff"/><text x="154" y="371" class="h2" fill="#fff">推送</text>

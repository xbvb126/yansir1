  <g transform="translate(360 720)">
    <text x="0" y="0" class="title">页面覆盖说明</text>
    <text x="0" y="36" class="txt">1. 数据页：DataView，市场概览、核心行情、异常指标。</text>
    <text x="0" y="66" class="txt">2. ValueClaw 页：ClawView，聊天输入、分析结果、数据卡。</text>
    <text x="0" y="96" class="txt">3. 雷达页：RadarConceptView，风险面板、优先级卡、扫描操作、异常表。</text>
    <text x="0" y="126" class="txt">4. 告警页：SignalViewV2，定时扫描、飞书配置、规则、候选信号与历史。</text>
    <text x="0" y="156" class="txt">5. 账户页：AccountView，资料卡、套餐、菜单、账户面板与管理员用户管理。</text>
    <text x="0" y="186" class="txt">6. 币种详情：SymbolDetailView，从数据/雷达等列表点击币种进入。</text>
    <text x="0" y="236" class="small">注：此 SVG 是效果图交付物，不修改应用源码；颜色、卡片、底栏、按钮均取自当前 CSS 的主视觉语义。</text>
